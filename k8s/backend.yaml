apiVersion: apps/v1
kind: Deployment
metadata:
  name: paybills-backend
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: paybills-backend
  template:
    metadata:
      labels:
        app: paybills-backend
    spec:
      containers:
        - name: backend
          image: my-registry/paybills-backend:latest
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: paybills-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: paybills-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: paybills-secrets
                  key: jwt-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: paybills-backend
  namespace: default
spec:
  selector:
    app: paybills-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
