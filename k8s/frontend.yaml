apiVersion: apps/v1
kind: Deployment
metadata:
  name: paybills-frontend
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: paybills-frontend
  template:
    metadata:
      labels:
        app: paybills-frontend
    spec:
      containers:
        - name: frontend
          image: my-registry/paybills-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.paybills.ng"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health  # Next.js usually doesn't have this by default, but good practice
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: paybills-frontend
  namespace: default
spec:
  selector:
    app: paybills-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
